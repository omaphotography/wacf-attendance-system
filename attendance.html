<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance | WACF Attendance System</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="overlay" class="overlay hidden"></div>

<!-- ===========================
SIDEBAR
=========================== -->

<aside id="sidebar" class="sidebar">

<div class="logo">

<img src="assets/logo.jpg" alt="Logo">

<h2>WORD ASSEMBLY</h2>

<p>Campus Fellowship</p>

</div>

<nav>

<a href="dashboard.html" class="menu">
<i class="fas fa-home"></i>
Dashboard
</a>

<a href="attendance.html" class="menu active">
<i class="fas fa-calendar-check"></i>
Attendance
</a>

<a href="members.html" class="menu">
<i class="fas fa-users"></i>
Members
</a>

<a href="import.html" class="menu">
<i class="fas fa-file-excel"></i>
Import Excel
</a>

<a href="reports.html" class="menu">
<i class="fas fa-chart-column"></i>
Reports
</a>

<a href="birthdays.html" class="menu">
<i class="fas fa-cake-candles"></i>
Birthdays
</a>

<a href="settings.html" class="menu">
<i class="fas fa-gear"></i>
Settings
</a>

<a href="#" id="logoutBtn" class="menu">
<i class="fas fa-right-from-bracket"></i>
Logout
</a>

</nav>

</aside>

<!-- ===========================
MAIN
=========================== -->

<div class="main">

<header class="header">

<div class="header-left">

<button id="menuBtn" class="menu-btn">

<i class="fas fa-bars"></i>

</button>

<h2>Weekly Attendance</h2>

</div>

<div class="header-right">

<i class="fas fa-calendar-week text-red-700 text-xl"></i>

</div>

</header>

<div class="content">

<!-- ===========================
SEARCH CARD
=========================== -->

<div class="card">

<h2 style="margin-bottom:20px;">

Search Member

</h2>

<div style="position:relative;">

<i class="fas fa-search"
style="position:absolute;left:15px;top:15px;color:#999;"></i>

<input
id="searchInput"
type="text"
class="input"
style="padding-left:45px;"
placeholder="Search by Name, Phone, Department or Level">

</div>

</div>

<!-- ===========================
SEARCH RESULTS
=========================== -->

<div id="searchResults"
class="card hidden"
style="margin-top:20px;padding:0;overflow:hidden;">

<!-- Search results appear here -->

</div>

<!-- ===========================
MEMBER CARD
=========================== -->

<div id="memberCard"
class="card hidden"
style="margin-top:25px;">

<div class="grid-2">

<div>

<label>Name</label>

<h3 id="name"></h3>

</div>

<div>

<label>Department</label>

<h3 id="department"></h3>

</div>

<div>

<label>Level</label>

<h3 id="level"></h3>

</div>

<div>

<label>Phone</label>

<h3 id="phone"></h3>

</div>

</div>

<button
id="markBtn"
class="btn btn-green"
style="margin-top:25px;">

<i class="fas fa-check"></i>

Mark Attendance

</button>

<p id="status"
style="margin-top:15px;font-weight:600;">

</p>

</div>

<!-- ===========================
NOT FOUND
=========================== -->

<div id="notFound"
class="card hidden"
style="margin-top:25px;text-align:center;">

<i class="fas fa-user-xmark"
style="font-size:60px;color:#b91c1c;"></i>

<h2 style="margin-top:20px;">

Member Not Found

</h2>

<p style="margin:15px 0;color:#666;">

This member is not registered.

</p>

<button
onclick="location.href='members.html'"
class="btn btn-red">

Register Member

</button>

</div>

</div>

</div>

<!-- ===========================
SCRIPTS
=========================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

<script src="js/app.js"></script>

<script src="js/auth.js"></script>

<script src="js/sidebar.js"></script>

<script src="js/attendance.js"></script>
</body>

</html>
