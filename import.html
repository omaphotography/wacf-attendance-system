<!-- =========================
MAIN
========================= -->


<div class="main">


<header class="header">


<div class="header-left">


<button id="menuBtn" class="menu-btn">

<i class="fas fa-bars"></i>

</button>



<h2>
Import Members
</h2>



</div>




<div class="header-right">


<i class="fas fa-file-import"
style="
font-size:22px;
color:#b91c1c;
">
</i>



</div>



</header>





<div class="content">





<!-- =========================
UPLOAD CARD
========================= -->


<div class="card">


<h2 class="mb-5 text-xl font-bold">

Upload Excel File

</h2>



<p class="mb-4 text-gray-500">

Excel format:

<strong>
full_name, birth_day, birth_month, address, department, level, phone1, phone2
</strong>

</p>



<input

type="file"

id="excelFile"

accept=".xlsx,.xls"

class="input"



>



<button

id="uploadBtn"

class="btn btn-red mt-5"

>


<i class="fas fa-upload"></i>

Upload & Preview


</button>



</div>







<!-- =========================
PREVIEW
========================= -->


<div

id="previewBox"

class="card hidden mt-6"

>



<h2 class="text-xl font-bold mb-5">

Preview Members

</h2>





<div class="table-container">


<table>



<thead>


<tr>


<th>
Name
</th>


<th>
Phone 1
</th>


<th>
Department
</th>


<th>
Level
</th>



</tr>



</thead>




<tbody id="previewTable">


</tbody>




</table>



</div>






<button

id="saveImport"

class="btn btn-green mt-5"

>


<i class="fas fa-database"></i>


Save Members



</button>




</div>





</div>


</div>

SCRIPTS
========================= -->

</script>
