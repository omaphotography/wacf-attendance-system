</head>


<body>

<!-- MAIN -->

<div class="main">



<header class="header">


<div class="header-left">


<button id="menuBtn" class="menu-btn">

<i class="fas fa-bars"></i>

</button>



<h2>
Attendance Reports
</h2>



</div>





<div class="header-right">


<i class="fas fa-chart-column report-icon"></i>


</div>


</header>







<main class="content">





<!-- FILTER -->

<div class="card">


<div class="grid-4">



<div>

<label>
Select Sunday
</label>


<input

type="date"

id="reportDate"

class="input">


</div>







<div>


<label>
&nbsp;
</label>


<button

id="loadReport"

class="btn btn-red full">


<i class="fas fa-search"></i>

Load Report


</button>


</div>







<div>


<label>
&nbsp;
</label>


<button

id="printReport"

class="btn btn-blue full">


<i class="fas fa-print"></i>

Print


</button>


</div>







<div>


<label>
&nbsp;
</label>


<button

id="excelReport"

class="btn btn-green full">


<i class="fas fa-file-excel"></i>

Export Excel


</button>


</div>





</div>


</div>









<br>







<!-- SUMMARY -->

<div class="grid-4">



<div class="card">


<div class="card-title">

Total Members

</div>


<div id="totalMembers" class="card-value">

0

</div>


</div>







<div class="card">


<div class="card-title">

Present

</div>


<div id="presentCount" class="card-value green">

0

</div>


</div>







<div class="card">


<div class="card-title">

Absent

</div>


<div id="absentCount" class="card-value red">

0

</div>


</div>







<div class="card">


<div class="card-title">

Attendance %

</div>


<div id="percentage" class="card-value yellow">

0%

</div>


</div>





</div>







<br>







<!-- REPORT TABLE -->


<div class="card">





<div class="tabs">



<button

id="allTab"

class="btn btn-red active">

All Members

</button>





<button

id="presentTab"

class="btn tab-gray">

Present Members

</button>





<button

id="absentTab"

class="btn tab-gray">

Absent Members

</button>




</div>







<div class="search-box">


<input

id="searchReport"

type="text"

class="input"

placeholder="Search member...">


</div>







<div class="table-container">



<table>



<thead>



<tr>


<th>
Member No
</th>



<th>
Name
</th>



<th>
Department
</th>



<th>
Level
</th>



<th>
Phone
</th>



<th>
Status
</th>


</tr>



</thead>







<tbody id="reportTable">



<tr>



<td colspan="6">


No Report Loaded


</td>



</tr>




</tbody>





</table>





</div>






</div>






</main>





</div>









<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="js/config.js"></script>


<script src="js/auth.js"></script>


<script src="js/sidebar.js"></script>


<script src="js/app.js"></script>


<script src="js/reports.js"></script>



</body>


</html>
